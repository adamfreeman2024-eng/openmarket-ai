services:
  openmarket:
    build: .
    ports:
      - "3010:3000"
    environment:
      - NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL:-http://localhost:3010}
      - NEXT_PUBLIC_HEDERA_NETWORK=${NEXT_PUBLIC_HEDERA_NETWORK:-testnet}
      - HEDERA_OPERATOR_ID=${HEDERA_OPERATOR_ID:-}
      - HEDERA_OPERATOR_KEY=${HEDERA_OPERATOR_KEY:-}
      - PLATFORM_FEE_BPS=${PLATFORM_FEE_BPS:-200}
      - ALLOW_DEV_FAKE_SETTLEMENT=${ALLOW_DEV_FAKE_SETTLEMENT:-true}
      - OM_DATA_DIR=/data
      - USDC_TOKEN_ID=${USDC_TOKEN_ID:-}
    volumes:
      - om_data:/data
    restart: unless-stopped

  # Optional: use later with DATABASE_URL adapter
  # postgres:
  #   image: postgres:16-alpine
  #   environment:
  #     POSTGRES_USER: openmarket
  #     POSTGRES_PASSWORD: openmarket
  #     POSTGRES_DB: openmarket
  #   volumes:
  #     - pg_data:/var/lib/postgresql/data
  #     - ./docs/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro

volumes:
  om_data:
