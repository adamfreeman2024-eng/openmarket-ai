# OpenMarket.ai — nginx reverse proxy (port 80/443 → Node :3010)

# Copy to /etc/nginx/sites-available/openmarket
# ln -s /etc/nginx/sites-available/openmarket /etc/nginx/sites-enabled/
# nginx -t && systemctl reload nginx

upstream openmarket_node {
    server 127.0.0.1:3010;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name openmarket.ai www.openmarket.ai _;

    # ACME (certbot)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        proxy_pass http://openmarket_node;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 60s;
    }
}

